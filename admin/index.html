<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>joschi Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #f8fff8 0%, #ffffff 40%);
            color: #38A169;
        }
        .text-joschi-green { color: #38A169; }
        .bg-joschi-green { background-color: #38A169; }
        .border-joschi-green { border-color: rgba(56, 161, 105, 0.25); }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'joschi-green': '#38A169'
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif']
                    }
                }
            }
        };
    </script>
</head>
<body class="min-h-screen">
    <main class="mx-auto max-w-5xl px-4 py-6 sm:px-6 sm:py-10">
        <header class="mb-8 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
            <div>
                <p class="text-sm uppercase tracking-[0.24em] text-joschi-green/70">klapp.pizza/admin</p>
                <h1 data-i18n="admin_heading" class="text-4xl sm:text-5xl text-joschi-green">reservierungen</h1>
            </div>
            <button id="logout-button" data-i18n="logout" type="button" class="hidden self-start rounded border border-joschi-green px-4 py-2 text-sm text-joschi-green transition-colors hover:bg-joschi-green/10">abmelden</button>
        </header>

        <section class="rounded-2xl border border-joschi-green bg-white/90 p-5 shadow-sm sm:p-6">
            <form id="admin-login-form" class="grid gap-4 sm:grid-cols-[1fr_auto] sm:items-end">
                <div>
                    <label for="admin-password" data-i18n="password" class="mb-1 block text-sm text-joschi-green">Passwort</label>
                    <input id="admin-password" name="admin-password" type="password" required
                        class="w-full rounded border border-joschi-green px-4 py-3 text-joschi-green outline-none focus:ring-1 focus:ring-joschi-green"
                        placeholder="ADMIN_PW">
                </div>
                <button type="submit" data-i18n="show" class="rounded bg-joschi-green px-5 py-3 text-sm font-medium text-white transition-opacity hover:opacity-90">Anzeigen</button>
            </form>
            <p id="admin-status" class="mt-3 text-sm text-joschi-green/80" aria-live="polite"></p>
        </section>

        <section class="mt-8">
            <div id="admin-empty" data-i18n="admin_empty" class="rounded-2xl border border-dashed border-joschi-green bg-white/60 p-6 text-sm text-joschi-green/75">
                Nach dem Login werden hier alle Reservierungen von heute und in der Zukunft angezeigt.
            </div>
            <div id="admin-list" class="grid gap-4"></div>
        </section>
    </main>

    <script>
        (function() {
            var locale = /^de\b/i.test((navigator.languages && navigator.languages[0]) || navigator.language || 'de') ? 'de' : 'en';
            var translations = {
                de: {
                    admin_heading: 'reservierungen',
                    logout: 'abmelden',
                    password: 'Passwort',
                    show: 'Anzeigen',
                    admin_empty: 'Nach dem Login werden hier alle Reservierungen von heute und in der Zukunft angezeigt.',
                    none_found: 'Keine kommenden Reservierungen gefunden.',
                    people: 'Personen',
                    no_message: 'Keine Nachricht hinterlegt.',
                    confirm: 'Bestätigen',
                    confirming: 'Reservierung wird bestätigt...',
                    confirmed: 'Reservierung bestätigt.',
                    confirm_failed: 'Bestätigung fehlgeschlagen.',
                    loading: 'Reservierungen werden geladen...',
                    loaded: 'Reservierungen geladen.',
                    login_failed: 'Login fehlgeschlagen.',
                    email: 'E-Mail',
                    phone: 'Telefon',
                    open: 'offen',
                    confirmed_status: 'bestätigt',
                    cancelled: 'storniert',
                    completed: 'erledigt',
                    no_show: 'nicht erschienen',
                    inside: 'innen',
                    outside: 'außen'
                },
                en: {
                    admin_heading: 'reservations',
                    logout: 'logout',
                    password: 'password',
                    show: 'show',
                    admin_empty: 'After login, all reservations for today and the future will appear here.',
                    none_found: 'No upcoming reservations found.',
                    people: 'guests',
                    no_message: 'No message provided.',
                    confirm: 'Confirm',
                    confirming: 'Confirming reservation...',
                    confirmed: 'Reservation confirmed.',
                    confirm_failed: 'Confirmation failed.',
                    loading: 'Loading reservations...',
                    loaded: 'Reservations loaded.',
                    login_failed: 'Login failed.',
                    email: 'Email',
                    phone: 'Phone',
                    open: 'open',
                    confirmed_status: 'confirmed',
                    cancelled: 'cancelled',
                    completed: 'completed',
                    no_show: 'no-show',
                    inside: 'inside',
                    outside: 'outside'
                }
            };
            function t(key) {
                return (translations[locale] && translations[locale][key]) || translations.de[key] || key;
            }
            function applyTranslations() {
                document.documentElement.lang = locale;
                var nodes = document.querySelectorAll('[data-i18n]');
                for (var i = 0; i < nodes.length; i++) {
                    nodes[i].textContent = t(nodes[i].getAttribute('data-i18n'));
                }
            }
            var PASSWORD_STORAGE_KEY = 'joschi-admin-password';
            var formEl = document.getElementById('admin-login-form');
            var passwordEl = document.getElementById('admin-password');
            var statusEl = document.getElementById('admin-status');
            var listEl = document.getElementById('admin-list');
            var emptyEl = document.getElementById('admin-empty');
            var logoutButtonEl = document.getElementById('logout-button');
            var currentPassword = sessionStorage.getItem(PASSWORD_STORAGE_KEY) || '';

            function setStatus(message) {
                statusEl.textContent = message || '';
            }

            function setLoggedIn(isLoggedIn) {
                logoutButtonEl.classList.toggle('hidden', !isLoggedIn);
            }

            async function postJson(url, payload) {
                var response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                var data = null;
                try {
                    data = await response.json();
                } catch (err) {
                    data = null;
                }

                if (!response.ok) {
                    throw new Error(data && data.error ? data.error : 'Request failed');
                }

                return data;
            }

            function formatArea(area) {
                return area === 'aussen' ? t('outside') : t('inside');
            }

            function formatStatus(status) {
                if (status === 'confirmed') return t('confirmed_status');
                if (status === 'pending') return t('open');
                if (status === 'cancelled') return t('cancelled');
                if (status === 'completed') return t('completed');
                if (status === 'no_show') return t('no_show');
                return status;
            }

            function renderReservations(reservations) {
                listEl.innerHTML = '';
                emptyEl.classList.toggle('hidden', reservations.length > 0);

                if (!reservations.length) {
                    emptyEl.textContent = t('none_found');
                    return;
                }

                for (var i = 0; i < reservations.length; i++) {
                    (function(reservation) {
                        var card = document.createElement('article');
                        card.className = 'rounded-2xl border border-joschi-green bg-white/95 p-5 shadow-sm';

                        var top = document.createElement('div');
                        top.className = 'flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between';

                        var titleWrap = document.createElement('div');
                        var title = document.createElement('h2');
                        title.className = 'text-2xl text-joschi-green';
                        title.textContent = reservation.reservation_date + ' · ' + String(reservation.reservation_time).slice(0, 5);

                        var sub = document.createElement('p');
                        sub.className = 'mt-1 text-sm text-joschi-green/80';
                        sub.textContent = reservation.guest_name + ' · ' + reservation.party_size + ' ' + t('people') + ' · ' + formatArea(reservation.area);

                        titleWrap.appendChild(title);
                        titleWrap.appendChild(sub);

                        var status = document.createElement('span');
                        status.className = 'inline-flex rounded-full border border-joschi-green px-3 py-1 text-xs uppercase tracking-[0.16em] text-joschi-green';
                        status.textContent = formatStatus(reservation.status);

                        top.appendChild(titleWrap);
                        top.appendChild(status);

                        var contact = document.createElement('div');
                        contact.className = 'mt-4 grid gap-1 text-sm text-joschi-green/90 sm:grid-cols-2';
                        contact.innerHTML =
                            '<p><strong>' + t('email') + ':</strong> ' + reservation.guest_email + '</p>' +
                            '<p><strong>' + t('phone') + ':</strong> ' + reservation.guest_phone + '</p>';

                        var notes = document.createElement('p');
                        notes.className = 'mt-4 text-sm text-joschi-green/80';
                        notes.textContent = reservation.notes ? reservation.notes : t('no_message');

                        var actions = document.createElement('div');
                        actions.className = 'mt-5 flex flex-wrap gap-3';

                        if (reservation.status !== 'confirmed') {
                            var confirmButton = document.createElement('button');
                            confirmButton.type = 'button';
                            confirmButton.className = 'rounded bg-joschi-green px-4 py-2 text-sm font-medium text-white transition-opacity hover:opacity-90';
                            confirmButton.textContent = t('confirm');
                            confirmButton.addEventListener('click', async function() {
                                confirmButton.disabled = true;
                                confirmButton.classList.add('opacity-60');
                                setStatus(t('confirming'));

                                try {
                                    await postJson('/api/admin/confirm', {
                                        password: currentPassword,
                                        reservation_id: reservation.id
                                    });
                                    await loadReservations();
                                    setStatus(t('confirmed'));
                                } catch (error) {
                                    confirmButton.disabled = false;
                                    confirmButton.classList.remove('opacity-60');
                                    setStatus(error.message || t('confirm_failed'));
                                }
                            });
                            actions.appendChild(confirmButton);
                        }

                        card.appendChild(top);
                        card.appendChild(contact);
                        card.appendChild(notes);
                        card.appendChild(actions);
                        listEl.appendChild(card);
                    })(reservations[i]);
                }
            }

            async function loadReservations() {
                var result = await postJson('/api/admin/reservations', {
                    password: currentPassword
                });
                renderReservations(result.reservations || []);
            }

            formEl.addEventListener('submit', async function(event) {
                event.preventDefault();
                currentPassword = passwordEl.value;
                setStatus(t('loading'));

                try {
                    await loadReservations();
                    sessionStorage.setItem(PASSWORD_STORAGE_KEY, currentPassword);
                    setLoggedIn(true);
                    setStatus(t('loaded'));
                } catch (error) {
                    setLoggedIn(false);
                    listEl.innerHTML = '';
                    emptyEl.classList.remove('hidden');
                    emptyEl.textContent = t('admin_empty');
                    setStatus(error.message || t('login_failed'));
                }
            });

            logoutButtonEl.addEventListener('click', function() {
                currentPassword = '';
                passwordEl.value = '';
                sessionStorage.removeItem(PASSWORD_STORAGE_KEY);
                setLoggedIn(false);
                listEl.innerHTML = '';
                emptyEl.classList.remove('hidden');
                emptyEl.textContent = t('admin_empty');
                setStatus('');
            });

            applyTranslations();
            if (currentPassword) {
                passwordEl.value = currentPassword;
                setLoggedIn(true);
                setStatus(t('loading'));
                loadReservations()
                    .then(function() {
                        setStatus(t('loaded'));
                    })
                    .catch(function(error) {
                        sessionStorage.removeItem(PASSWORD_STORAGE_KEY);
                        currentPassword = '';
                        passwordEl.value = '';
                        setLoggedIn(false);
                        setStatus(error.message || t('login_failed'));
                    });
            }
        })();
    </script>
</body>
</html>
